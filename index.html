<!DOCTYPE html>
<html>

<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login">

<h2>Chat Login</h2>

<input id="user" placeholder="username">

<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

<button onclick="register()">Register</button>

</div>

<script>

function login(){

fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(res=>res.json())
.then(data=>{
localStorage.setItem("user",data.username);
window.location="chat.html";
});

}

function register(){

fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
});

alert("registered");

}

</script>

</body>
</html>
